name: edu_connect
description: EduConnect — School communication platform for teachers and parents.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local Auth & Audit
  flutter_secure_storage: ^9.2.2
  device_info_plus: ^10.1.0
  crypto: ^3.0.3

  # HTTP + WebSocket (replaces Firestore)
  dio: ^5.4.3
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.5.5

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # UI
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_localizations:
    sdk: flutter

  # Utilities
  intl: any
  uuid: ^4.4.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
