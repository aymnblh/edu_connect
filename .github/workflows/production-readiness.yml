name: Production Readiness

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    name: Backend security gates
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://edu_app:edu_app_password@127.0.0.1:5432/edu_connect_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/edu_connect_test
      RUN_DB_TESTS: "1"
      REDIS_URL: redis://127.0.0.1:1/0
      PRIVATE_KEY_PATH: tests/.test_keys/private_key.pem
      PUBLIC_KEY_PATH: tests/.test_keys/public_key.pem
      SERVER_FINGERPRINT_SALT: test-fingerprint-salt
      PLATFORM_SECRET: test-platform-secret
      CORS_ORIGINS: http://testserver
    defaults:
      run:
        working-directory: edu_connect_backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edu_connect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d edu_connect_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: edu_connect_backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare test keys
        run: |
          python - <<'PY'
          from pathlib import Path
          from cryptography.hazmat.primitives import serialization
          from cryptography.hazmat.primitives.asymmetric import rsa

          key_dir = Path("tests/.test_keys")
          key_dir.mkdir(exist_ok=True)
          private_key = rsa.generate_private_key(public_exponent=65537, key_size=2048)
          (key_dir / "private_key.pem").write_bytes(
              private_key.private_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PrivateFormat.PKCS8,
                  encryption_algorithm=serialization.NoEncryption(),
              )
          )
          (key_dir / "public_key.pem").write_bytes(
              private_key.public_key().public_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PublicFormat.SubjectPublicKeyInfo,
              )
          )
          PY

      - name: Create non-superuser app database role
        env:
          ADMIN_DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/edu_connect_test
        run: |
          python - <<'PY'
          import os
          import sqlalchemy as sa
          from sqlalchemy import text

          engine = sa.create_engine(os.environ["ADMIN_DATABASE_URL"], isolation_level="AUTOCOMMIT")
          with engine.begin() as conn:
              conn.execute(text("DROP ROLE IF EXISTS edu_app"))
              conn.execute(text("""
                  CREATE ROLE edu_app
                  LOGIN PASSWORD 'edu_app_password'
                  NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOBYPASSRLS
              """))
              conn.execute(text("GRANT CONNECT ON DATABASE edu_connect_test TO edu_app"))
              conn.execute(text("GRANT USAGE, CREATE ON SCHEMA public TO edu_app"))
          engine.dispose()
          PY

      - name: Compile backend
        run: python -m compileall app alembic tests scripts

      - name: Check production posture
        run: python scripts/check_production_posture.py

      - name: Check staging parity template
        run: python scripts/check_staging_parity.py --allow-placeholders

      - name: Rehearse JWT key rotation
        run: python scripts/rehearse_key_rotation.py

      - name: Check Alembic release shape
        run: python scripts/check_alembic_release.py --sql-output /tmp/alembic-upgrade-head.sql

      - name: Check production Docker config
        env:
          ENV_FILE: .env.production.example
        run: docker compose --env-file .env.production.example -f docker-compose.yml config --quiet

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: python -m pytest -q

      - name: Report launch blockers
        run: python scripts/production_launch_status.py --verify-local --allow-blockers

  web:
    name: Web build
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: https://api.educonnect.dz
    defaults:
      run:
        working-directory: edu_connect_web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: edu_connect_web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint web app
        run: npm run lint

      - name: Test workspace role isolation
        run: npm run test:workspace

      - name: Test web env validation
        run: npm run test:env

      - name: Validate production web env
        run: npm run check:env

      - name: Test web secret scanner
        run: npm run test:secret-scanner

      - name: Build web app
        run: npm run build

      - name: Scan built web artifacts for secrets
        run: npm run test:secrets

      - name: Smoke built web app
        run: npm run test:preview

  flutter:
    name: Flutter analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edu_connect

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Flutter app
        run: flutter analyze
